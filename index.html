<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>31st of February Terminal</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="terminal-shell">
      <header class="status-panel">
        <h1>31st of February Terminal</h1>
        <div class="stats-grid">
          <div><span>Battery</span><strong id="stat-battery">100%</strong></div>
          <div><span>Stability</span><strong id="stat-stability">100%</strong></div>
          <div><span>SIP</span><strong id="stat-sip">0</strong></div>
          <div><span>Loop #</span><strong id="tracker-loop">-</strong></div>
          <div><span>OS die</span><strong id="tracker-os-die">-</strong></div>
          <div><span>Dice Mode</span><strong id="stat-mode">AUTO</strong></div>
        </div>
      </header>

      <section class="tracker-panel" aria-label="Objective tracker">
        <div><span>Station</span><strong id="tracker-station">-</strong></div>
        <div><span>Objective</span><strong id="stat-objective">-</strong></div>
        <div class="tracker-wide"><span>Candidate</span><strong id="tracker-candidate">-</strong></div>
        <div class="tracker-short"><span>MSK</span><strong id="tracker-msk">-</strong></div>
        <div class="tracker-short"><span>SNS</span><strong id="tracker-sns">-</strong></div>
        <div class="tracker-short"><span>LOG</span><strong id="tracker-log">-</strong></div>
      </section>

      <section id="log" class="log" aria-live="polite"></section>

      <section id="choices" class="choices" aria-label="Quick choices"></section>

      <form class="input-row" onsubmit="return false;">
        <label id="prompt-text" for="terminal-input">&gt;</label>
        <input
          id="terminal-input"
          type="text"
          autocomplete="off"
          spellcheck="false"
          placeholder="Type a command..."
          aria-label="Terminal command input"
        />
      </form>
    </main>

    <script type="module" src="./app.js"></script>
  </body>
</html>
